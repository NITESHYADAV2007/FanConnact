        const grid = document.getElementById('calendar-days');
        const title = document.getElementById('month-title');
        title.textContent = MONTHS[currentMonth] + ' ' + currentYear;

        const days = getDaysInMonth(currentMonth, currentYear);
        const firstDay = getFirstDayOfMonth(currentMonth, currentYear);
        const today = new Date();

        grid.innerHTML = '';
        for (let i = 0; i < firstDay; i++) {
          const d = document.createElement('div');
          grid.appendChild(d);
        }
        for (let day = 1; day <= days; day++) {
          const d = document.createElement('div');
          const dateStr = currentYear + '-' + String(currentMonth + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
          const isToday = dateStr === today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
          const isSelected = dateStr === selectedDate;
          const hasEvent = ALL_MATCHES.some(m => m.date === dateStr && (selectedSport === 'all' || m.sport === selectedSport));
          const classes = ['calendar-day', 'h-8', 'md:h-10', 'flex', 'items-center', 'justify-center', 'rounded-lg', 'cursor-pointer', 'text-xs', 'md:text-sm', 'font-semibold', 'text-gray-800', 'dark:text-gray-100'];
          if (isToday) classes.push('today');
          if (isSelected && !isToday) classes.push('selected');
          if (!isToday && !isSelected) classes.push('hover:bg-gray-100', 'dark:hover:bg-white/10');
          if (hasEvent && !isToday) classes.push('has-event');
          d.className = classes.join(' ');
          d.textContent = day;
          d.dataset.date = dateStr;
          d.addEventListener('click', () => {
            selectedDate = dateStr;
            renderCalendar();
            renderMatches();
          });
          grid.appendChild(d);
        }
      }

      function renderMatches() {
        const container = document.getElementById('matches-container');
        const dateInfo = document.getElementById('selected-date');
        const matchCount = document.getElementById('match-count');

        let matches = selectedSport === 'all' ? ALL_MATCHES : ALL_MATCHES.filter(m => m.sport === selectedSport);
        if (selectedDate) {
          matches = matches.filter(m => m.date === selectedDate);
        }

        if (selectedDate) {
          const d = new Date(selectedDate + 'T00:00:00');
          dateInfo.textContent = d.toDateString();
        } else {
          dateInfo.textContent = selectedSport === 'all' ? 'All Upcoming Matches' : 'Upcoming ' + selectedSport.charAt(0).toUpperCase() + selectedSport.slice(1) + ' Matches';
        }

        matchCount.textContent = matches.length + ' match' + (matches.length !== 1 ? 'es' : '');

        if (matches.length === 0) {
          container.innerHTML = '<div class="bg-white dark:bg-brand-card border border-gray-200 dark:border-border-subtle rounded-xl p-8 text-center"><span class="material-symbols-outlined text-4xl text-gray-400">event_busy</span><p class="text-gray-500 dark:text-gray-400 mt-2">No matches scheduled' + (selectedDate ? ' on this date' : '') + '.</p></div>';
          return;
        }

        matches.sort((a, b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));

        container.innerHTML = matches.map(m => {
          const icon = SPORT_ICONS[m.sport] || 'sports';
          const sportName = m.sport.charAt(0).toUpperCase() + m.sport.slice(1);
          const d = new Date(m.date + 'T00:00:00');
          const dateStr = d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
          return '<div class="match-card bg-white dark:bg-brand-card border border-gray-200 dark:border-border-subtle rounded-xl p-4 md:p-5 hover:border-emerald-accent/50">' +
            '<div class="flex items-start justify-between mb-3">' +
              '<div class="flex items-center gap-2">' +
                '<span class="material-symbols-outlined text-emerald-accent text-lg">' + icon + '</span>' +
                '<span class="text-[10px] md:text-[11px] font-bold uppercase tracking-wider text-emerald-accent">' + m.tournament + '</span>' +
              '</div>' +
              '<span class="text-[10px] md:text-[11px] text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-white/10 px-2.5 py-1 rounded-md font-semibold">' + m.type + '</span>' +
            '</div>' +
            '<div class="flex items-center justify-between py-1">' +
              '<div class="flex flex-col items-start gap-0.5">' +
                '<p class="text-sm md:text-base font-bold team-name">' + m.team1 + '</p>' +
              '</div>' +
              '<div class="flex flex-col items-center px-2 md:px-4">' +
                '<div class="text-[10px] md:text-xs font-black text-emerald-accent uppercase tracking-widest bg-emerald-accent/10 px-3 py-1 rounded-full">VS</div>' +
              '</div>' +
              '<div class="flex flex-col items-end gap-0.5">' +
                '<p class="text-sm md:text-base font-bold team-name">' + m.team2 + '</p>' +
              '</div>' +
            '</div>' +
            '<div class="flex flex-wrap items-center gap-x-4 gap-y-1.5 mt-3 pt-3 border-t border-gray-100 dark:border-gray-800 text-[11px] md:text-xs text-gray-600 dark:text-gray-300">' +
              '<span class="flex items-center gap-1.5"><span class="material-symbols-outlined text-sm text-emerald-accent">calendar_today</span>' + dateStr + '</span>' +
              '<span class="flex items-center gap-1.5"><span class="material-symbols-outlined text-sm text-emerald-accent">schedule</span>' + m.time + '</span>' +
              '<span class="flex items-center gap-1.5"><span class="material-symbols-outlined text-sm text-emerald-accent">location_on</span>' + m.venue + '</span>' +
            '</div>' +
          '</div>';
        }).join('');
      }

      function init() {
        selectedSport = getSportFromURL();
        document.querySelectorAll('.sport-tab').forEach(b => {
          b.classList.toggle('active-sport-tab', b.dataset.sport === selectedSport);
        });
        renderCalendar();
        renderMatches();
      }

      document.querySelectorAll('.sport-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.sport-tab').forEach(b => b.classList.remove('active-sport-tab'));
          btn.classList.add('active-sport-tab');
          selectedSport = btn.dataset.sport;
          selectedDate = null;
          renderCalendar();
          renderMatches();
        });
      });

      document.getElementById('prev-month').addEventListener('click', () => {
        currentMonth--;
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
        selectedDate = null;
        renderCalendar();
        renderMatches();
      });

      document.getElementById('next-month').addEventListener('click', () => {
        currentMonth++;
        if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        selectedDate = null;
        renderCalendar();
        renderMatches();
      });

      document.addEventListener('DOMContentLoaded', init);
    </script>
  <script src="js/notif-ws.js"></script></body>
</html>
