      };
      function getFlag(country) { const code = COUNTRY_FLAGS[country] || "in"; return `https://flagcdn.com/16x12/${code}.png`; }

      function showLoading() {
        document.getElementById('result-count').textContent = 'Loading...';
        document.getElementById('result-updated').textContent = '';
        document.getElementById('result-badge').classList.add('hidden');
        document.getElementById('table-body').innerHTML =
          '<tr><td colspan="10" class="px-4 py-12 text-center"><div class="inline-block w-8 h-8 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div><p class="text-gray-400 mt-2 text-sm">Fetching rankings data...</p></td></tr>';
      }

      function showError(msg) {
        document.getElementById('result-count').textContent = 'Error';
        document.getElementById('result-updated').textContent = '';
        document.getElementById('table-body').innerHTML =
          '<tr><td colspan="10" class="px-4 py-12 text-center"><p class="text-red-400 text-sm">' + msg + '</p></td></tr>';
      }

      async function switchSport(sid) {
        currentSport = sid;
        document.querySelectorAll('.sport-btn').forEach(b => b.classList.toggle('active-sport', b.dataset.sport === sid));

        document.getElementById('title-text').textContent = 'Loading...';
        document.getElementById('subtitle-text').textContent = 'Fetching rankings data...';
        showLoading();

        // Show team rankings link for this sport
        var teamHeader = document.getElementById('team-link-header');
        var sportMap = { 'e-sports': 'esports', 'kabbaddi': 'kabaddi', 'table-tennis': 'table-tennis' };
        var href = 'leaderboard.html?game=' + (sportMap[sid] || sid);
        if (teamHeader) { teamHeader.classList.remove('hidden'); teamHeader.href = href; }

        try {
          const cfgRes = await fetch(API_BASE + '/api/sports/' + sid, { signal: AbortSignal.timeout(4000) });
          if (!cfgRes.ok) throw new Error('Config fetch failed');
          sportConfig = await cfgRes.json();
          usingServer = true;

          document.getElementById('title-text').textContent = sportConfig.title;
          document.getElementById('subtitle-text').textContent = (sportConfig.tournament ? sportConfig.tournament + ' \u2014 ' : '') + sportConfig.subtitle;

          activeFilters = {};
          sportConfig.filters.forEach(f => { activeFilters[f.group] = f.options[0].value; });
          columns = sportConfig.columns;
          renderFilters();
          await fetchRankings();
        } catch (e) {
          usingServer = false;
          var fb = FALLBACK.getConfig(sid);
          if (fb) {
            sportConfig = fb;
            document.getElementById('title-text').textContent = sportConfig.title;
            document.getElementById('subtitle-text').textContent = (sportConfig.tournament ? sportConfig.tournament + ' \u2014 ' : '') + sportConfig.subtitle + ' (offline mode)';
            activeFilters = {};
            sportConfig.filters.forEach(function(f) { activeFilters[f.group] = f.options[0].value; });
            columns = sportConfig.columns;
            renderFilters();
            await fetchRankings();
          } else {
            showError('Could not load data \u2014 server unreachable.');
          }
        }
      }

      function buildKey() {
        if (!sportConfig || !sportConfig.filters) return '';
        return sportConfig.filters.map(f => activeFilters[f.group] || f.options[0].value).join('_');
      }

      function setSourceBadge(source) {
        var badge = document.getElementById('result-badge');
        if (!badge) return;
        badge.classList.remove('hidden');
        var classes = {
          'icc': 'bg-blue-500/20 text-blue-400 border-blue-500/30',
          'espn': 'bg-red-500/20 text-red-400 border-red-500/30',
          'fifa': 'bg-purple-500/20 text-purple-400 border-purple-500/30',
          'sportscore': 'bg-green-500/20 text-green-400 border-green-500/30',
          'api-sports': 'bg-orange-500/20 text-orange-400 border-orange-500/30',
          'database': 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30',
          'generated': 'bg-gray-500/20 text-gray-400 border-gray-500/30',
        };
        var cls = classes[source] || classes['generated'];
        badge.className = 'px-2 py-0.5 rounded-full text-[9px] font-bold uppercase border ' + cls;
        var labels = {
          'icc': 'ICC Official',
          'espn': 'ESPN',
          'fifa': 'FIFA',
          'sportscore': 'SportScore',
          'api-sports': 'API-Sports',
          'database': 'Database',
          'generated': 'Estimated',
        };
        badge.textContent = labels[source] || source;
      }

      async function fetchRankings() {
        showLoading();
        if (!usingServer) {
          var fbPlayers = FALLBACK.getPlayers(currentSport, buildKey());
          if (fbPlayers && fbPlayers.length) {
            players = fbPlayers;
            document.getElementById('result-count').textContent = players.length + ' players';
            document.getElementById('result-updated').textContent = 'Estimated data (offline mode)';
            setSourceBadge('generated');
            renderTable();
          } else {
            showError('No data available for this category.');
          }
          return;
        }
        try {
          var now = Date.now();
          const res = await fetch(API_BASE + '/api/rankings/' + currentSport + '/' + buildKey(), { signal: AbortSignal.timeout(5000) });
          if (!res.ok) throw new Error('Rankings fetch failed');
          const data = await res.json();
          players = data.players || [];
          document.getElementById('result-count').textContent = players.length + ' players';
          setSourceBadge(data.source || 'generated');
          if (data._lastSync) {
            document.getElementById('result-updated').textContent = 'Updated: ' + new Date(data._lastSync).toLocaleString();
          } else if (data.source === 'sportscore') {
            document.getElementById('result-updated').innerHTML = 'English Premier League &middot; <a href="https://sportscore.com/" rel="dofollow" target="_blank" class="text-emerald-400 hover:text-emerald-300 underline">SportScore</a>';
          } else if (data.source === 'espn') {
            document.getElementById('result-updated').innerHTML = '<a href="https://www.espn.com/" rel="dofollow" target="_blank" class="text-emerald-400 hover:text-emerald-300 underline">ESPN</a>';
          } else {
            document.getElementById('result-updated').textContent = 'Data loaded';
          }
          renderTable();
        } catch (e) {
          usingServer = false;
          var fbPlayers = FALLBACK.getPlayers(currentSport, buildKey());
          if (fbPlayers && fbPlayers.length) {
            players = fbPlayers;
            document.getElementById('result-count').textContent = players.length + ' players';
            document.getElementById('result-updated').textContent = 'Estimated data (offline mode)';
            setSourceBadge('generated');
            renderTable();
          } else {
            showError('Could not load rankings \u2014 server unreachable.');
          }
        }
      }

      function renderFilters() {
        if (!sportConfig || !sportConfig.filters || !sportConfig.filters.length) {
          document.getElementById('filter-bar').innerHTML = '<div class="text-gray-400 text-sm">No filters</div>';
          return;
        }
        var html = '';
        sportConfig.filters.forEach(function(fg, fi) {
          if (fi > 0) html += '<span class="text-gray-300 dark:text-gray-600 hidden sm:inline mx-2">|</span>';
          html += '<div class="flex items-center gap-2"><span class="text-[10px] sm:text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider whitespace-nowrap">' + fg.label + ':</span><div class="flex gap-1 bg-gray-100 dark:bg-black/40 rounded-lg p-1">';
          fg.options.forEach(function(opt) {
            var isActive = activeFilters[fg.group] === opt.value;
            html += '<button class="filter-btn px-3 py-1.5 text-xs sm:text-sm font-medium rounded-md transition-all ' + (isActive ? 'active-filter bg-white dark:bg-brand-card shadow-sm text-emerald-600 dark:text-emerald-400' : 'text-gray-600 dark:text-gray-300 hover:text-gray-800 dark:hover:text-white') + '" data-group="' + fg.group + '" data-value="' + opt.value + '">' + opt.label + '</button>';
          });
          html += '</div></div>';
        });
        document.getElementById('filter-bar').innerHTML = html;

        document.querySelectorAll('.filter-btn').forEach(function(btn) {
          btn.addEventListener('click', function() {
            var group = btn.dataset.group;
            var value = btn.dataset.value;
            activeFilters[group] = value;
            document.querySelectorAll('.filter-btn[data-group="' + group + '"]').forEach(function(b) {
              b.classList.remove('active-filter','bg-white','dark:bg-brand-card','shadow-sm','text-emerald-600','dark:text-emerald-400');
              b.classList.add('text-gray-600','dark:text-gray-300');
            });
            btn.classList.add('active-filter','bg-white','dark:bg-brand-card','shadow-sm','text-emerald-600','dark:text-emerald-400');
            btn.classList.remove('text-gray-600','dark:text-gray-300');
            fetchRankings();
          });
        });
      }

      function renderTable() {
        var head = document.getElementById('table-head');
        var body = document.getElementById('table-body');

        var hh = '<tr class="bg-gray-50 dark:bg-black/30 text-gray-500 dark:text-gray-400 text-xs uppercase tracking-wider"><th class="px-4 py-3 border-b border-gray-200 dark:border-border-subtle font-semibold w-12">Rank</th>';
        columns.forEach(function(col) {
          var hide = col.hide ? 'hidden ' + (col.hide === 'sm' ? 'sm:table-cell' : col.hide === 'md' ? 'md:table-cell' : 'lg:table-cell') : '';
          var align = col.align === 'center' ? 'text-center' : '';
          hh += '<th class="px-4 py-3 border-b border-gray-200 dark:border-border-subtle font-semibold ' + hide + ' ' + align + '">' + col.label + '</th>';
        });
        hh += '</tr>';
        head.innerHTML = hh;

        if (!players || !players.length) {
          body.innerHTML = '<tr><td colspan="' + (columns.length + 1) + '" class="px-4 py-12 text-center text-gray-400">No players found</td></tr>';
          return;
        }

        var bh = '';
        players.forEach(function(p, idx) {
          bh += '<tr class="hover:bg-gray-50 dark:hover:bg-white/5 transition-colors cursor-pointer" data-idx="' + idx + '"><td class="px-4 py-3"><span class="font-bold text-gray-900 dark:text-white text-sm">' + p.rank + '</span></td>';
          columns.forEach(function(col) {
            var hide = col.hide ? 'hidden ' + (col.hide === 'sm' ? 'sm:table-cell' : col.hide === 'md' ? 'md:table-cell' : 'lg:table-cell') : '';
            var align = col.align === 'center' ? 'text-center' : '';
            var val = p[col.key];
            if (val === undefined || val === null) val = '-';

            if (col.key === 'name') {
              bh += '<td class="px-4 py-3 ' + hide + '"><div class="flex items-center gap-3"><div class="w-9 h-9 rounded-full bg-gradient-to-br from-emerald-400/30 to-blue-500/30 flex items-center justify-center text-xs font-bold text-emerald-600 dark:text-emerald-400 flex-shrink-0">' + String(val).charAt(0) + '</div><p class="font-semibold text-gray-900 dark:text-white text-sm leading-tight">' + val + '</p></div></td>';
            } else if (col.key === 'country') {
              var displayVal = val || p.team || '';
              bh += '<td class="px-4 py-3 ' + hide + '"><div class="flex items-center gap-1.5">' + (displayVal ? '<img src="' + getFlag(displayVal) + '" alt="" class="w-4 h-3 rounded-sm" onerror="this.style.display=\'none\'" /><span class="text-xs text-gray-500 dark:text-gray-400">' + displayVal + '</span>' : '<span class="text-xs text-gray-400">-</span>') + '</div></td>';
            } else {
              bh += '<td class="px-4 py-3 ' + hide + ' ' + align + '"><span class="text-sm text-gray-600 dark:text-gray-300">' + (col.align === 'center' ? '<span class="font-bold text-emerald-600 dark:text-emerald-400">' + val + '</span>' : val) + '</span></td>';
            }
          });
          bh += '</tr>';
        });
        body.innerHTML = bh;

        document.querySelectorAll('#table-body tr[data-idx]').forEach(function(el) {
          el.addEventListener('click', function() {
            var idx = parseInt(el.dataset.idx);
            var p = players[idx];
            if (p) {
              var activeBtn = document.querySelector('.sport-btn.active-sport');
              var rawSport = activeBtn ? (activeBtn.getAttribute('data-sport') || activeBtn.textContent.trim()) : 'Cricket';
              var sportName = rawSport.charAt(0).toUpperCase() + rawSport.slice(1).toLowerCase();
              if (sportName === "E-sports") sportName = "E-Sports";
              if (sportName === "Table-tennis") sportName = "Table Tennis";
              if (sportName === "Kabbaddi") sportName = "Kabaddi";
              sessionStorage.setItem('playerSport', sportName);
              sessionStorage.setItem('playerView', JSON.stringify({ player: p, sport: sportName }));
              window.location.href = 'player.html';
            }
          });
        });
      }

      function showProfile(p) {
        var modal = document.getElementById('pm');
        var body = document.getElementById('mb');
        var excluded = ['rank','name','country'];
        body.innerHTML = '<div class="flex items-center gap-4 pb-4 border-b border-gray-200 dark:border-border-subtle"><div class="w-16 h-16 rounded-full bg-gradient-to-br from-emerald-400/30 to-blue-500/30 flex items-center justify-center text-xl font-bold text-emerald-600 dark:text-emerald-400 flex-shrink-0">' + (p.name||'?').charAt(0) + '</div><div><h2 class="text-xl font-bold text-gray-900 dark:text-white">' + (p.name||'Unknown') + '</h2><div class="flex items-center gap-2 mt-1">' + (p.country ? '<img src="' + getFlag(p.country) + '" alt="" class="w-5 h-4 rounded-sm" onerror="this.style.display=\'none\'" /><span class="text-sm text-gray-500 dark:text-gray-400">' + p.country + '</span>' : '') + (p.rank ? '<span class="text-xs px-2 py-0.5 rounded-full bg-gray-100 dark:bg-white/10 text-gray-600 dark:text-gray-400">Rank #' + p.rank + '</span>' : '') + '</div></div></div><div class="grid grid-cols-2 gap-3">' + Object.entries(p).filter(function(kv){return !excluded.includes(kv[0])}).map(function(kv) {
          var key = kv[0], val = kv[1];
          var label = key.charAt(0).toUpperCase() + key.slice(1).replace(/_/g,' ');
          var display = val !== undefined && val !== null ? val : '-';
          var big = key === 'rating' || key === 'points' ? 'text-2xl' : 'text-xl';
          return '<div class="bg-gray-50 dark:bg-white/5 rounded-xl p-3 text-center"><p class="text-xs text-gray-400 dark:text-gray-500 uppercase">' + label + '</p><p class="' + big + ' font-bold text-emerald-600 dark:text-emerald-400 mt-0.5">' + display + '</p></div>';
        }).join('') + '</div><div class="pt-2"><button onclick="document.getElementById(\'pm\').classList.add(\'hidden\')" class="w-full py-2.5 rounded-xl bg-emerald-500 hover:bg-emerald-600 text-white font-semibold text-sm transition-colors">Close Profile</button></div>';
        modal.classList.remove('hidden');
      }

      document.querySelectorAll('.sport-btn').forEach(btn => {
        btn.addEventListener('click', () => { switchSport(btn.dataset.sport); });
      });
      document.getElementById('cm').addEventListener('click', () => document.getElementById('pm').classList.add('hidden'));
      document.getElementById('pm').addEventListener('click', e => { if (e.target === document.getElementById('pm')) document.getElementById('pm').classList.add('hidden'); });

      // Refresh button
      document.getElementById('refresh-btn').addEventListener('click', function() {
        var btn = this;
        btn.classList.add('animate-spin');
        switchSport(currentSport).finally(function() {
          setTimeout(function() { btn.classList.remove('animate-spin'); }, 500);
        });
      });

      // Fetch and display last-updated time
      fetch(API_BASE + '/api/sync/last-updated', { signal: AbortSignal.timeout(3000) })
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(d) {
          if (d && d.lastSync) {
            var el = document.getElementById('result-updated');
            if (el && !el.textContent) el.textContent = 'Last sync: ' + d.humanReadable;
          }
        })
        .catch(function() {});

      FALLBACK.loadStaticData().then(function() {
        const urlSport = new URLSearchParams(window.location.search).get('game');
        const sportMap = { 'kabaddi': 'kabbaddi' };
        switchSport(urlSport ? (sportMap[urlSport] || urlSport) : 'cricket');
      });
    </script>

  <script src="js/notif-ws.js"></script></body>
</html>
