    <script type="module" src="js/script.js"></script>
    <script type="module">
      import { loadNewStyleNews, renderFilterChips, renderLanguageSelector, LANGUAGES } from './js/news.js';
      import { renderHighlights } from './js/highlights.js';

      let currentSport = 'all';
      let currentLang = 'en';

      const newsContainer = document.getElementById('news-new-style');
      const filterChips = document.getElementById('news-filter-chips');
      const badge = document.getElementById('news-count-badge');
      const langDropdown = document.getElementById('lang-dropdown');
      const langBtn = document.getElementById('lang-selector-btn');
      const langLabel = document.getElementById('current-lang-label');

      function initLangSelector() {
        const saved = localStorage.getItem('fanconnect-news-lang');
        if (saved) currentLang = saved;
        langDropdown.innerHTML = renderLanguageSelector(currentLang);
        const lang = LANGUAGES.find(l => l.code === currentLang);
        if (lang) langLabel.textContent = lang.code.toUpperCase();

        langBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          langDropdown.classList.toggle('hidden');
        });

        document.addEventListener('click', () => langDropdown.classList.add('hidden'));

        langDropdown.addEventListener('click', async (e) => {
          const btn = e.target.closest('.lang-btn');
          if (!btn) return;
          const code = btn.dataset.lang;
          if (code === currentLang) { langDropdown.classList.add('hidden'); return; }
          currentLang = code;
          localStorage.setItem('fanconnect-news-lang', code);
          const lang = LANGUAGES.find(l => l.code === code);
          if (lang) langLabel.textContent = lang.code.toUpperCase();
          langDropdown.innerHTML = renderLanguageSelector(currentLang);
          langDropdown.classList.add('hidden');
          filterChips.innerHTML = renderFilterChips(currentSport, currentLang);
          const articles = await loadNewStyleNews(newsContainer, { sport: currentSport, language: currentLang });
          if (badge) badge.textContent = (articles ? articles.length : 0) + ' articles';
        });
      }

      async function initFilters() {
        filterChips.innerHTML = renderFilterChips(currentSport, currentLang);
        filterChips.addEventListener('click', async (e) => {
          const chip = e.target.closest('.filter-chip');
          if (!chip) return;
          const sport = chip.dataset.sport;
          if (sport === currentSport) return;
          currentSport = sport;
          filterChips.innerHTML = renderFilterChips(currentSport, currentLang);
          const articles = await loadNewStyleNews(newsContainer, { sport: currentSport, language: currentLang });
          if (badge) badge.textContent = (articles ? articles.length : 0) + ' articles';
        });
      }

      async function init() {
        initLangSelector();
        await initFilters();
        const articles = await loadNewStyleNews(newsContainer, { sport: currentSport, language: currentLang });
        const highlightsSection = document.getElementById('highlights-section');
        if (highlightsSection) await renderHighlights(highlightsSection, 'football');
        if (badge) badge.textContent = (articles ? articles.length : 0) + ' articles';
      }

      init();
    </script>
    <script>
      document.addEventListener('DOMContentLoaded',()=>{
        const btn=document.getElementById('theme-toggle');
        const light=document.getElementById('theme-toggle-light-icon');
        const dark=document.getElementById('theme-toggle-dark-icon');
        function render(){
          const isDark=localStorage.getItem('color-theme')==='dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark',isDark);
          document.documentElement.classList.toggle('light',!isDark);
          if(light) light.classList.toggle('hidden',isDark);
          if(dark) dark.classList.toggle('hidden',!isDark);
        }
        render();
        btn?.addEventListener('click',()=>{
          const next=document.documentElement.classList.contains('dark')?'light':'dark';
          localStorage.setItem('color-theme',next);
          render();
        });
      });
    </script>
  <script src="js/notif-ws.js"></script>
