<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FanConnect - Sign Up</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .signup-container {
            background: white;
            padding: 30px;
            width: 400px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        button:hover {
            background: #1d4ed8;
        }
        
        p {
            text-align: center;
            margin-top: 15px;
        }
        
        a {
            text-decoration: none;
            color: #2563eb;
        }
    </style>
</head>

<body>

    <div class="signup-container">

        <h2>Create Account</h2>

        <form id="signupForm">

            <input type="text" id="name" placeholder="Enter Your Name" required>

            <input type="email" id="email" placeholder="Enter Your Email" required>

            <input type="password" id="password" placeholder="Enter Password" required>

            <button type="submit">
                Sign Up
            </button>

        </form>

        <p>
            Already have an account?
            <a href="login.html">Login</a>
        </p>

    </div>

    <script type="module" src="./js/signup.js"></script>

</body>

</html>
