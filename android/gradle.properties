org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false

# WORKAROUND: Kotlin compiler daemon corrupts its incremental cache on this
# Windows setup ("Storage is already registered" / "Could not close incremental
# caches"). Force in-process compilation (no daemon) and disable incremental
# Kotlin compilation so the cache files are never reused across runs.
kotlin.compiler.execution.strategy=in-process
kotlin.incremental=false
org.gradle.daemon=false
