<!doctype html>

    <script>
      if (
        localStorage.getItem("color-theme") === "dark" ||
        (!("color-theme" in localStorage) &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>

      rel="stylesheet"
    />

      rel="stylesheet"
    />
    <style>
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

      .dark body { @apply bg-[#0B0E11] text-white; }
      .light body { @apply bg-[#F8F9FF] text-slate-900; }
      .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { @apply rounded; }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb { @apply bg-brand-border; }
      .light .custom-scrollbar::-webkit-scrollbar-thumb { @apply bg-gray-300; }
      .nav-link-active { @apply font-medium; }
      .dark .nav-link-active { @apply bg-brand-green/20 text-brand-green border-r-4 border-brand-green !important; }
      .dark .nav-link-active span, .dark .nav-link-active .nav-text { color: #10b981 !important; }
      :root:not(.dark) .nav-link-active { @apply bg-emerald-50 text-emerald-700 border-r-4 border-emerald-500 !important; }
      .sidebar-collapsed #sidebar { width: 0 !important; min-width: 0 !important; border: 0 !important; padding: 0 !important; overflow: hidden !important; }
      .text-fan { color: #ffffff !important; }
      :root:not(.dark) .text-connect { color: #4648d4 !important; }
      .dark .text-connect { color: #10b981 !important; }
      :root:not(.dark) .text-fan { color: #374151 !important; }
      .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>

              DEFAULT: "0.25rem",

            <h2 class="text-2xl font-bold mb-6 font-headline">Trending Updates</h2>

    </main>
    <script type="module">
      const apiKey = 'pub_dc31baef0579472db73d0351d47277b5';
      const newsUrl = `https://newsdata.io/api/1/news?apikey=${apiKey}&category=sports&language=en`;

      async function loadRealTimeNews() {
        const heroContainer = document.getElementById('hero-news-container');
        const gridContainer = document.getElementById('news-grid');

        try {
          const response = await fetch(newsUrl);
          const data = await response.json();

          if (data.status === "success" && data.results.length > 0) {
            const articles = data.results;
            
            // 1. Render Hero Article
            const hero = articles[0];
            heroContainer.innerHTML = `
              <section class="relative h-[450px] rounded-3xl overflow-hidden shadow-2xl group cursor-pointer" onclick="window.open('${hero.link}', '_blank')">
                <img src="${hero.image_url || 'https://images.unsplash.com/photo-1504450758481-7338eba7524a?auto=format&fit=crop&q=80&w=1536'}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent"></div>
                <div class="absolute bottom-0 left-0 p-8 w-full md:w-3/4">
                  <span class="px-3 py-1 bg-red-600 text-white text-[10px] font-bold rounded-full mb-4 inline-block uppercase tracking-widest">Breaking News</span>
                  <h1 class="text-3xl md:text-5xl font-black font-headline text-white leading-tight mb-4">${hero.title}</h1>
                  <p class="text-gray-300 text-sm md:text-base line-clamp-2 mb-6">${hero.description || ''}</p>
                  <button class="bg-brand-green text-black font-bold px-6 py-3 rounded-xl transition-all hover:scale-105 active:scale-95">Read Full Story</button>
                </div>
              </section>`;

            // 2. Render News Grid
            gridContainer.innerHTML = articles.slice(1).map(article => `
              <div class="bg-white dark:bg-brand-card rounded-2xl overflow-hidden border border-gray-200 dark:border-brand-border group hover:border-brand-green/50 transition-all cursor-pointer shadow-sm flex flex-col" onclick="window.open('${article.link}', '_blank')">
                <div class="aspect-video relative overflow-hidden">
                  <img src="${article.image_url || 'https://images.unsplash.com/photo-1517649763962-0c623066013b?auto=format&fit=crop&q=80&w=800'}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                  <span class="absolute top-3 left-3 bg-brand-green/90 text-black text-[10px] font-bold px-2 py-1 rounded uppercase">${article.source_id || 'Sports'}</span>
                </div>
                <div class="p-5 flex-1 flex flex-col">
                  <h3 class="font-bold text-lg leading-snug mb-3 group-hover:text-brand-green transition-colors line-clamp-2">${article.title}</h3>
                  <p class="text-slate-500 dark:text-gray-400 text-xs line-clamp-3 mb-4">${article.description || ''}</p>
                  <div class="mt-auto pt-4 border-t border-gray-100 dark:border-gray-800 flex justify-between items-center">
                    <span class="text-[10px] text-gray-500 font-medium">${new Date(article.pubDate).toLocaleDateString()}</span>
                    <span class="text-brand-green font-bold text-xs flex items-center gap-1">Full Story <span class="material-symbols-outlined text-sm">arrow_outward</span></span>
                  </div>
                </div>
              </div>
            `).join('');
          }
        } catch (error) {
          console.error("News Load Error:", error);
        }
      }
      loadRealTimeNews();
    </script>
    <script type="module" src="js/script.js"></script>
