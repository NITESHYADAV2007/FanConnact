<!doctype html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" sizes="32x32" href="assets/fancoin/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/fancoin/favicon-16x16.png" />
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Reset Password | Fanconnact</title>
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-surface": "#001b3d",
                        "surface": "#ffffff",
                        "on-surface-variant": "#414751",
                        "surface-variant": "#dfe2eb",
                        "outline-variant": "#c1c7d0",
                        primary: "#00658b",
                        "primary-container": "#d1e4ff",
                        "on-primary-container": "#001d36",
                        "on-primary": "#003258",
                        "surface-dim": "#cbdbf5",
                        "brand-green": "#10b981",
                        "emerald-accent": "#10b981",
                    },
                    fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] },
                    fontSize: {
                        "headline-lg": ["32px", { lineHeight: "40px", letterSpacing: "-0.01em", fontWeight: "700" }],
                        "headline-md": ["24px", { lineHeight: "32px", fontWeight: "600" }],
                        "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
                        "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
                        "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }],
                        "label-md": ["14px", { lineHeight: "20px", fontWeight: "600" }],
                    },
                },
            },
        };
    </script>
    <style>
        :root:not(.dark) ::-webkit-scrollbar-track { background: #f1f5f9; }
        :root:not(.dark) ::-webkit-scrollbar-thumb { background: #2196f3; }
        .dark ::-webkit-scrollbar-thumb { background: #10b981; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #34d399; }
        :root:not(.dark) input:focus { border-color: #2196f3 !important; box-shadow: 0 0 0 2px rgba(33,150,243,0.2) !important; }
        .dark .text-gray-400 { color: #94a3b8 !important; }
    </style>
</head>

<body class="bg-white dark:bg-black font-sans text-on-surface dark:text-on-inverse-surface h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md relative">
        <button id="theme-toggle" class="absolute -top-12 right-0 p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-all active:scale-95">
            <span id="theme-toggle-light-icon" class="material-symbols-outlined hidden text-yellow-400">light_mode</span>
            <span id="theme-toggle-dark-icon" class="material-symbols-outlined text-slate-500 dark:text-slate-400">dark_mode</span>
        </button>

        <div class="bg-white dark:bg-black rounded-2xl shadow-2xl p-8 space-y-6">
            <div class="text-center space-y-2">
                <div class="w-14 h-14 mx-auto bg-primary-container rounded-xl flex items-center justify-center glow-emerald">
                    <span class="material-symbols-outlined text-on-primary-container" style="font-variation-settings: 'FILL' 1">lock_reset</span>
                </div>
                <h1 class="font-headline-lg text-headline-lg text-on-surface dark:text-white">Set a New Password</h1>
                <p class="text-body-md text-surface-dim dark:text-slate-400">Choose a strong password that meets the rules below.</p>
            </div>

            <form id="reset-form" class="space-y-4">
                <div class="space-y-1">
                    <label for="new-password" class="text-label-md font-semibold text-on-surface dark:text-slate-300">New Password</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-surface-dim dark:text-slate-500">lock</span>
                        <input id="new-password" type="password" required placeholder="8+ chars, A-Z, a-z, @ # _" class="w-full pl-10 pr-10 py-3 rounded-xl bg-surface-variant/10 border border-outline-variant/30 text-on-surface dark:text-white placeholder:text-surface-dim/50 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" />
                        <button type="button" id="toggle-new-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-surface-dim dark:text-slate-500 hover:text-on-surface transition-colors" aria-label="Toggle password visibility">
                            <span class="material-symbols-outlined" id="new-password-eye">visibility</span>
                        </button>
                    </div>
                    <p id="password-msg" class="text-xs mt-1 ml-1 hidden"></p>
                </div>

                <div class="space-y-1">
                    <label for="confirm-password" class="text-label-md font-semibold text-on-surface dark:text-slate-300">Confirm Password</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-surface-dim dark:text-slate-500">lock</span>
                        <input id="confirm-password" type="password" required placeholder="Re-enter new password" class="w-full pl-10 pr-10 py-3 rounded-xl bg-surface-variant/10 border border-outline-variant/30 text-on-surface dark:text-white placeholder:text-surface-dim/50 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" />
                        <button type="button" id="toggle-confirm-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-surface-dim dark:text-slate-500 hover:text-on-surface transition-colors" aria-label="Toggle password visibility">
                            <span class="material-symbols-outlined" id="confirm-password-eye">visibility</span>
                        </button>
                    </div>
                    <p id="confirm-msg" class="text-xs mt-1 ml-1 hidden"></p>
                </div>

                <div id="message-container" class="hidden"></div>

                <button id="reset-btn" type="submit" class="w-full bg-gradient-to-r from-primary to-primary-container hover:brightness-110 active:scale-[0.98] transition-all text-on-primary font-headline-md py-4 rounded-xl flex items-center justify-center gap-2 shadow-lg glow-emerald group">
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">check</span>
                    Update Password
                </button>
            </form>

            <div class="text-center">
                <a href="login.html" class="text-sm text-primary hover:underline font-medium">Back to Login</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { confirmPasswordReset, verifyPasswordResetCode } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { auth } from "./js/firebase-config.js";

        const form = document.getElementById("reset-form");
        const pwInput = document.getElementById("new-password");
        const confirmInput = document.getElementById("confirm-password");
        const pwMsg = document.getElementById("password-msg");
        const confirmMsg = document.getElementById("confirm-msg");
        const resetBtn = document.getElementById("reset-btn");
        const msgContainer = document.getElementById("message-container");

        function showMessage(text, type) {
            msgContainer.classList.remove("hidden", "bg-red-500/10", "bg-emerald-500/10", "text-red-400", "text-emerald-400");
            const isError = type === "error";
            msgContainer.classList.add(isError ? "bg-red-500/10" : "bg-emerald-500/10", isError ? "text-red-400" : "text-emerald-400");
            msgContainer.textContent = text;
            msgContainer.className = msgContainer.className.replace(/p-\d+/g, "").trim();
            msgContainer.classList.add("p-4", "rounded-xl", "text-body-sm");
        }

        // Same password rules as signup
        function validatePassword(val) {
            const fails = [];
            if (val.length < 8) fails.push('8+ chars');
            if (!/[A-Z]/.test(val)) fails.push('A-Z');
            if (!/[a-z]/.test(val)) fails.push('a-z');
            if (!/[@#_]/.test(val)) fails.push('@ # _');
            if (/(?:012|123|234|345|456|567|678|789|890|abc|bcd|cde|def|efg|fgh|ghi|hij|ijk|jkl|klm|lmn|mno|nop|opq|pqr|qrs|rst|stu|tuv|uvw|vwx|wxy|xyz)/i.test(val)) fails.push('no seq (123, abc)');
            return fails;
        }
        function showPwMsg(val) {
            if (!val) { pwMsg.textContent = ''; pwMsg.className = 'text-xs mt-1 ml-1 hidden'; return; }
            const fails = validatePassword(val);
            if (fails.length) {
                pwMsg.textContent = 'Missing: ' + fails.join(', ');
                pwMsg.className = 'text-xs mt-1 ml-1 text-red-400';
            } else {
                pwMsg.textContent = 'Strong password';
                pwMsg.className = 'text-xs mt-1 ml-1 text-emerald-400';
            }
        }
        function showConfirmMsg() {
            const v = confirmInput.value;
            if (!v) { confirmMsg.textContent = ''; confirmMsg.className = 'text-xs mt-1 ml-1 hidden'; return; }
            if (v !== pwInput.value) {
                confirmMsg.textContent = 'Passwords do not match';
                confirmMsg.className = 'text-xs mt-1 ml-1 text-red-400';
            } else {
                confirmMsg.textContent = 'Passwords match';
                confirmMsg.className = 'text-xs mt-1 ml-1 text-emerald-400';
            }
        }
        pwInput.addEventListener('input', (e) => showPwMsg(e.target.value));
        confirmInput.addEventListener('input', showConfirmMsg);

        // Password visibility toggles
        function bindToggle(btnId, input, eyeId) {
            const btn = document.getElementById(btnId);
            const eye = document.getElementById(eyeId);
            btn?.addEventListener('click', () => {
                const isPw = input.type === 'password';
                input.type = isPw ? 'text' : 'password';
                eye.textContent = isPw ? 'visibility_off' : 'visibility';
            });
        }
        bindToggle('toggle-new-password', pwInput, 'new-password-eye');
        bindToggle('toggle-confirm-password', confirmInput, 'confirm-password-eye');

        // Read the reset code from the URL (?oobCode=...)
        const params = new URLSearchParams(window.location.search);
        const oobCode = params.get('oobCode');
        let codeValid = false;

        if (!oobCode) {
            showMessage("Invalid or missing reset link. Please request a new one.", "error");
            resetBtn.disabled = true;
        } else {
            verifyPasswordResetCode(auth, oobCode)
                .then(() => { codeValid = true; })
                .catch(() => {
                    showMessage("This reset link is invalid or has expired. Please request a new one.", "error");
                    resetBtn.disabled = true;
                });
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const password = pwInput.value;
            const confirm = confirmInput.value;
            if (!oobCode || !codeValid) { showMessage("Reset link is not valid. Please request a new one.", "error"); return; }
            if (!password) { showMessage("Please enter a new password.", "error"); return; }
            const fails = validatePassword(password);
            if (fails.length) { showMessage("Password must follow the rules: " + fails.join(', '), "error"); return; }
            if (password !== confirm) { showMessage("Passwords do not match.", "error"); return; }

            resetBtn.disabled = true;
            resetBtn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span> Updating...`;
            try {
                await confirmPasswordReset(auth, oobCode, password);
                showMessage("Password updated! Redirecting to login...", "success");
                setTimeout(() => { window.location.href = "login.html"; }, 1800);
            } catch (error) {
                console.error("Confirm reset error:", error.code, error.message);
                const msg = error.code === "auth/expired-action-code" ? "This reset link has expired. Please request a new one."
                    : error.code === "auth/invalid-action-code" ? "This reset link is invalid. Please request a new one."
                    : error.code === "auth/weak-password" ? "Password is too weak. " + (error.message || "")
                    : "Could not reset password. Please try again.";
                showMessage(msg, "error");
                resetBtn.disabled = false;
                resetBtn.innerHTML = `<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">check</span> Update Password`;
            }
        });
    </script>

    <script src="js/theme.js"></script>
    <script type="module" src="js/script.js"></script>
</body>

</html>
