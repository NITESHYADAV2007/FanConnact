<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Forgot Password | FanConnect</title>
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-secondary-fixed-variant": "#2f2ebe",
                        "surface-dim": "#cbdbf5",
                        "surface-container-high": "#dce9ff",
                        "surface-container": "#e2ecfc",
                        "inverse-surface": "#081b33",
                        "surface-container-low": "#e8f1ff",
                        "primary-container": "#d1e4ff",
                        "on-primary-container": "#001d36",
                        "primary-fixed-dim": "#a4c9ff",
                        "on-surface": "#001b3d",
                        "surface": "#f4faff",
                        "on-tertiary": "#001d36",
                        "on-primary": "#003258",
                        "on-inverse-surface": "#e1eaff",
                        "on-surface-variant": "#414751",
                        "surface-tint": "#00658b",
                        "outline-variant": "#c1c7d0",
                        "tertiary-container": "#c7e6ff",
                        "primary-fixed": "#d1e4ff",
                        "on-primary-fixed": "#001d36",
                        "on-surface-dim": "#5a6070",
                        "on-error-container": "#410e0b",
                        on: {
                            "error-container": "#f9dedc",
                        },
                        "surface-variant": "#dfe2eb",
                        primary: "#00658b",
                        tertiary: "#006494",
                        "on-surface-fixed-variant": "#42474e",
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#f0f0f7",
                        "inverse-primary": "#8fcaff",
                        "on-surface-fixed": "#1a1c21",
                        "on-tertiary-container": "#001e31",
                        error: "#ba1a1a",
                        "surface-dim/50": "rgba(90, 96, 112, 0.5)",
                        "outline-variant/30": "rgba(193, 199, 208, 0.3)",
                        "outline-variant/20": "rgba(193, 199, 208, 0.2)",
                        "brand-green": "#10b981",
                        "emerald-accent": "#10b981",
                        "fan-dark": "#0a0e1a",
                    },
                    fontFamily: {
                        sans: ["Inter", "system-ui", "sans-serif"],
                    },
                    fontSize: {
                        "headline-lg": ["32px", {
                            lineHeight: "40px",
                            letterSpacing: "-0.01em",
                            fontWeight: "700"
                        }],
                        "headline-md": ["24px", {
                            lineHeight: "32px",
                            fontWeight: "600"
                        }],
                        "body-lg": ["18px", {
                            lineHeight: "28px",
                            fontWeight: "400"
                        }],
                        "body-md": ["16px", {
                            lineHeight: "24px",
                            fontWeight: "400"
                        }],
                        "body-sm": ["14px", {
                            lineHeight: "20px",
                            fontWeight: "400"
                        }],
                        "label-sm": ["12px", {
                            lineHeight: "14px",
                            fontWeight: "700"
                        }],
                        "label-md": ["14px", {
                            lineHeight: "20px",
                            fontWeight: "600"
                        }],
                    },
                },
            },
        };
    </script>
</head>

<body class="bg-inverse-surface font-sans text-on-surface h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md relative">
        <button id="theme-toggle" class="absolute -top-12 right-0 p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-all active:scale-95">
        <span id="theme-toggle-light-icon" class="material-symbols-outlined hidden text-yellow-400">light_mode</span>
        <span id="theme-toggle-dark-icon" class="material-symbols-outlined text-slate-500 dark:text-slate-400">dark_mode</span>
      </button>

        <div class="bg-surface dark:bg-[#0f1d33] rounded-2xl shadow-2xl p-8 space-y-6">
            <div class="text-center space-y-2">
                <div class="w-14 h-14 mx-auto bg-primary-container rounded-xl flex items-center justify-center glow-emerald">
                    <span class="material-symbols-outlined text-on-primary-container" style="font-variation-settings: 'FILL' 1">lock_reset</span>
                </div>
                <h1 class="font-headline-lg text-headline-lg text-on-surface dark:text-white">Forgot Password?</h1>
                <p class="text-body-md text-surface-dim dark:text-slate-400">Enter your email and we'll send you a reset link.</p>
            </div>

            <form id="forgot-password-form" class="space-y-4">
                <div class="space-y-1">
                    <label for="reset-email" class="text-label-md font-semibold text-on-surface dark:text-slate-300">Email Address</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-surface-dim dark:text-slate-500">mail</span>
                        <input id="reset-email" type="email" required placeholder="Enter your email" class="w-full pl-10 pr-4 py-3 rounded-xl bg-surface-variant/10 border border-outline-variant/30 text-on-surface dark:text-white placeholder:text-surface-dim/50 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all"
                        />
                    </div>
                </div>

                <div id="message-container" class="hidden"></div>

                <button id="reset-btn" type="submit" class="w-full bg-gradient-to-r from-primary to-primary-container hover:brightness-110 active:scale-[0.98] transition-all text-on-primary font-headline-md py-4 rounded-xl flex items-center justify-center gap-2 shadow-lg glow-emerald group">
            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">send</span>
            Send Reset Link
          </button>
            </form>

            <div class="text-center">
                <a href="login.html" class="text-primary-fixed-dim font-semibold text-body-md hover:underline inline-flex items-center gap-1">
                    <span class="material-symbols-outlined text-sm">arrow_back</span> Back to Login
                </a>
            </div>
        </div>
    </div>

    <script type="module">
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"; import { auth } from "./js/firebase-config.js"; const form = document.getElementById("forgot-password-form"); const emailInput = document.getElementById("reset-email");
        const resetBtn = document.getElementById("reset-btn"); const msgContainer = document.getElementById("message-container"); function showMessage(text, type) { msgContainer.classList.remove("hidden", "bg-red-500/10", "bg-emerald-500/10", "text-red-400",
        "text-emerald-400"); const isError = type === "error"; msgContainer.classList.add(isError ? "bg-red-500/10" : "bg-emerald-500/10", isError ? "text-red-400" : "text-emerald-400"); msgContainer.textContent = text; msgContainer.className = msgContainer.className.replace(/p-\d+/g,
        "").trim(); msgContainer.classList.add("p-4", "rounded-xl", "text-body-sm"); } form.addEventListener("submit", async (e) => { e.preventDefault(); const email = emailInput.value.trim(); if (!email) { showMessage("Please enter your email address.",
        "error"); return; } resetBtn.disabled = true; resetBtn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span> Sending...`; try { await sendPasswordResetEmail(auth, email); showMessage("Reset link sent! Check your email inbox.", "success"); emailInput.value = ""; } catch (error) { const msg = error.code === "auth/user-not-found" ? "No account found with this email." : error.code === "auth/invalid-email" ? "Invalid email address." : "Failed to send reset email. Try again."; showMessage(msg, "error"); } finally { resetBtn.disabled = false; resetBtn.innerHTML = `<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">send</span> Send Reset Link`; } });
    </script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const t = document.getElementById("theme-toggle");
            const light = document.getElementById("theme-toggle-light-icon");
            const dark = document.getElementById("theme-toggle-dark-icon");

            function sync() {
                const isDark = document.documentElement.classList.contains("dark");
                if (light) light.classList.toggle("hidden", !isDark);
                if (dark) dark.classList.toggle("hidden", isDark);
            }
            sync();
            t?.addEventListener("click", () => {
                document.documentElement.classList.toggle("dark");
                localStorage.setItem("color-theme", document.documentElement.classList.contains("dark") ? "dark" : "light");
                sync();
            });
        });
    </script>
    <script src="js/theme.js"></script>
</body>

</html>
